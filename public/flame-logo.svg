        C660 390, 685 420, 700 460
        Q720 510, 725 540
        C735 590, 730 640, 720 680
        Q710 720, 690 750
        C665 800, 630 830, 590 850
        Q560 865, 530 870
        C515 875, 500 875, 485 870
        Q455 865, 430 850
        C390 830, 355 800, 330 750
        Q310 720, 300 680
        C290 640, 285 590, 295 540
        Q300 510, 320 460
        C335 420, 360 390, 385 350
        Q410 310, 435 260
        C455 220, 512 160, 512 160Z"/>
    </clipPath>
  </defs>

