      <stop offset="35%" stop-color="#B33A00"/>
      <stop offset="65%" stop-color="#D4700A"/>
      <stop offset="100%" stop-color="#E8941A"/>
    </linearGradient>
    <!-- Darker gradient for inner flame -->
    <linearGradient id="flameGradDark" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#6B1A00"/>
      <stop offset="50%" stop-color="#993300"/>
      <stop offset="100%" stop-color="#CC6600"/>
    </linearGradient>
    <!-- Circuit line gradient -->
    <linearGradient id="circuitGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#7A2000"/>
      <stop offset="100%" stop-color="#CC7A1A"/>
    </linearGradient>
    <clipPath id="flameClip">
