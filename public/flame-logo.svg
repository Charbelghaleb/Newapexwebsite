<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Flame gradient: dark red base to orange/gold top -->
    <linearGradient id="flameGrad" x1="0.5" y1="1" x2="0.5" y2="0">
