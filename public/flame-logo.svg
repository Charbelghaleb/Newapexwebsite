  <line x1="460" y1="500" x2="410" y2="580" stroke="url(#circuitGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="440" y1="560" x2="420" y2="650" stroke="url(#circuitGrad)" stroke-width="1.5" opacity="0.6"/>

