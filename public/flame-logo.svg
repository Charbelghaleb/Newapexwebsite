  <line x1="564" y1="500" x2="614" y2="580" stroke="url(#circuitGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="584" y1="560" x2="604" y2="650" stroke="url(#circuitGrad)" stroke-width="1.5" opacity="0.6"/>

