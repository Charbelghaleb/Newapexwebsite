    <text font-family="monospace" font-size="18" fill="#1a1a1a" letter-spacing="2">
      <textPath href="#textCircle">01011011010110110101110001011100010101011 0101101010111000101110001βεdr σntΔΞ31 3β5ΔΛ110Rd0110101Δβ65Ξ30110001 11Ξ1DA5Δ6Ξ3β10000101 10100001011 01011001011101011001010100 010110101011100100010101 0111010110100101010111100011101010111</textPath>
    </text>
  </g>

