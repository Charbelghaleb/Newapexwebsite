  <line x1="410" y1="620" x2="614" y2="620" stroke="url(#circuitGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="430" y1="680" x2="594" y2="680" stroke="url(#circuitGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="455" y1="740" x2="569" y2="740" stroke="url(#circuitGrad)" stroke-width="2" opacity="0.8"/>

