    <circle cx="644" cy="500" r="4"/>
    <circle cx="624" cy="560" r="4"/>
    <circle cx="614" cy="620" r="4"/>
    <circle cx="594" cy="680" r="4"/>
    <circle cx="569" cy="740" r="4"/>
    <circle cx="634" cy="510" r="3.5"/>
    <circle cx="614" cy="580" r="3.5"/>
    <circle cx="604" cy="650" r="3.5"/>
    <circle cx="564" cy="500" r="3.5"/>
    <circle cx="584" cy="560" r="3.5"/>
    <circle cx="579" cy="380" r="3.5"/>
    <circle cx="559" cy="320" r="3.5"/>
