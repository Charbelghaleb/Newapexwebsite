    <circle cx="430" cy="680" r="4"/>
    <circle cx="455" cy="740" r="4"/>
    <circle cx="390" cy="510" r="3.5"/>
    <circle cx="410" cy="580" r="3.5"/>
    <circle cx="420" cy="650" r="3.5"/>
    <circle cx="460" cy="500" r="3.5"/>
    <circle cx="440" cy="560" r="3.5"/>
    <circle cx="445" cy="380" r="3.5"/>
    <circle cx="465" cy="320" r="3.5"/>

